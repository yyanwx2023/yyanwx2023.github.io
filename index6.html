<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>跳绳计数器</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a0a;
  color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  overflow: hidden;
  height: 100vh;
  height: 100dvh;
  display: flex;
  flex-direction: column;
}
#videoContainer {
  position: relative;
  flex: 1;
  overflow: hidden;
}
video {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  transform: scaleX(-1);
}
canvas {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  transform: scaleX(-1);
}
#overlay {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: env(safe-area-inset-top, 20px);
  pointer-events: none;
  z-index: 10;
}
#countDisplay {
  font-size: 100px;
  font-weight: 800;
  text-shadow: 0 4px 20px rgba(0,0,0,0.8);
  margin-top: 16px;
  font-variant-numeric: tabular-nums;
  transition: transform 0.08s ease;
}
#countDisplay.pulse { transform: scale(1.18); }
#timer {
  font-size: 22px;
  font-weight: 600;
  color: rgba(255,255,255,0.65);
  margin-top: 4px;
}
#status {
  position: absolute;
  bottom: 130px;
  font-size: 15px;
  color: rgba(255,255,255,0.55);
  text-align: center;
  padding: 6px 14px;
  background: rgba(0,0,0,0.4);
  border-radius: 18px;
}
#controls {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  display: flex;
  justify-content: center;
  gap: 24px;
  padding: 20px;
  padding-bottom: calc(20px + env(safe-area-inset-bottom, 0px));
  z-index: 20;
  background: linear-gradient(transparent, rgba(0,0,0,0.85));
}
.btn {
  width: 60px; height: 60px;
  border-radius: 50%;
  border: 2.5px solid #fff;
  background: rgba(255,255,255,0.12);
  color: #fff;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  transition: all 0.15s;
}
.btn:active { transform: scale(0.88); background: rgba(255,255,255,0.25); }
.btn.primary {
  width: 76px; height: 76px;
  background: #4CAF50;
  border-color: #4CAF50;
  font-size: 16px;
}
.btn.primary.running { background: #e53935; border-color: #e53935; }
#loading {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: #0a0a0a;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 100;
}
#loading h2 { font-size: 22px; margin-bottom: 12px; }
#loading p { color: rgba(255,255,255,0.5); font-size: 13px; max-width: 260px; text-align: center; line-height: 1.5; }
.spinner {
  width: 36px; height: 36px;
  border: 3px solid rgba(255,255,255,0.15);
  border-top-color: #4CAF50;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  margin-bottom: 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.flash {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(76,175,80,0.12);
  pointer-events: none;
  opacity: 0;
  z-index: 5;
  transition: opacity 0.06s;
}
.flash.on { opacity: 1; }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <h2>加载中</h2>
  <p id="loadMsg">正在加载 TensorFlow.js...</p>
</div>

<div id="videoContainer">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>
  <div class="flash" id="flash"></div>
</div>

<div id="overlay">
  <div id="countDisplay">0</div>
  <div id="timer">00:00</div>
  <div id="status">点击开始按钮</div>
</div>

<div id="controls">
  <button class="btn" id="resetBtn">重置</button>
  <button class="btn primary" id="startBtn">开始</button>
</div>

<!-- Load TF.js and pose-detection -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core@4.22.0/dist/tf-core.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter@4.22.0/dist/tf-converter.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl@4.22.0/dist/tf-backend-webgl.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3/dist/pose-detection.min.js"></script>

<script>
(async function() {
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const countDisplay = document.getElementById('countDisplay');
  const timerDisplay = document.getElementById('timer');
  const statusEl = document.getElementById('status');
  const loadingEl = document.getElementById('loading');
  const loadMsg = document.getElementById('loadMsg');
  const startBtn = document.getElementById('startBtn');
  const flashEl = document.getElementById('flash');

  let detector = null;
  let running = false;
  let count = 0;
  let startTime = null;
  let timerInterval = null;

  // Jump detection state
  let yBuffer = [];
  const BUF_SIZE = 15;
  let inJump = false;
  let lastJumpTime = 0;
  const MIN_INTERVAL = 300; // ms between jumps
  let smoothedY = null;

  // --- Init ---
  try {
    loadMsg.textContent = '正在初始化摄像头...';
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 480 }, height: { ideal: 640 }, frameRate: { ideal: 30 } }
    });
    video.srcObject = stream;
    await new Promise(r => { video.onloadeddata = r; });
    await video.play();

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    loadMsg.textContent = '正在加载姿态检测模型...\n首次约需10秒';

    await tf.setBackend('webgl');
    await tf.ready();

    detector = await poseDetection.createDetector(
      poseDetection.SupportedModels.MoveNet,
      { modelType: poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING }
    );

    loadingEl.style.display = 'none';
    statusEl.textContent = '准备就绪 — 点击开始';
    requestAnimationFrame(loop);
  } catch (err) {
    loadMsg.textContent = '❌ ' + err.message;
    console.error(err);
  }

  // --- Main loop ---
  async function loop() {
    if (detector && video.readyState >= 2) {
      const poses = await detector.estimatePoses(video);
      draw(poses);
      if (running) countJumps(poses);
    }
    requestAnimationFrame(loop);
  }

  // --- Draw skeleton ---
  function draw(poses) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (!poses.length) return;
    const kp = poses[0].keypoints;

    const pairs = [
      [5,7],[7,9], [6,8],[8,10], // arms
      [5,6], // shoulders
      [5,11],[6,12],[11,12], // torso
      [11,13],[13,15], [12,14],[14,16] // legs
    ];

    ctx.strokeStyle = 'rgba(76,175,80,0.65)';
    ctx.lineWidth = 2.5;
    for (const [a, b] of pairs) {
      if (kp[a].score > 0.3 && kp[b].score > 0.3) {
        ctx.beginPath();
        ctx.moveTo(kp[a].x, kp[a].y);
        ctx.lineTo(kp[b].x, kp[b].y);
        ctx.stroke();
      }
    }

    for (const p of kp) {
      if (p.score > 0.3) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, 3.5, 0, Math.PI * 2);
        ctx.fillStyle = '#4CAF50';
        ctx.fill();
      }
    }
  }

  // --- Jump counting ---
  function countJumps(poses) {
    if (!poses.length) {
      statusEl.textContent = '未检测到人';
      return;
    }

    const kp = poses[0].keypoints;

    // Track hip center (keypoints 11=leftHip, 12=rightHip)
    const lh = kp[11], rh = kp[12];
    if (lh.score < 0.3 || rh.score < 0.3) {
      statusEl.textContent = '请全身入镜';
      return;
    }

    let hipY = (lh.y + rh.y) / 2;

    // Exponential smoothing
    if (smoothedY === null) smoothedY = hipY;
    smoothedY = smoothedY * 0.65 + hipY * 0.35;

    yBuffer.push(smoothedY);
    if (yBuffer.length > BUF_SIZE) yBuffer.shift();
    if (yBuffer.length < 6) return;

    const n = yBuffer.length;
    const cur = yBuffer[n - 1];
    const prev = yBuffer[n - 2];

    // Body scale for adaptive threshold
    const ls = kp[5], rs = kp[6]; // shoulders
    const shoulderY = (ls.y + rs.y) / 2;
    const bodyH = Math.abs(shoulderY - smoothedY);
    const thr = Math.max(bodyH * 0.10, 8); // pixels

    const now = Date.now();
    const dt = now - lastJumpTime;

    // Phase detection using buffer trend
    // Going up: y is decreasing (y axis points down)
    // Going down: y is increasing
    const olderHalf = yBuffer.slice(0, Math.floor(n / 2));
    const newerHalf = yBuffer.slice(Math.floor(n / 2));
    const olderAvg = olderHalf.reduce((a, b) => a + b) / olderHalf.length;
    const newerAvg = newerHalf.reduce((a, b) => a + b) / newerHalf.length;

    // Rising phase: newer average is higher (smaller y = higher in image)
    const goingUp = (olderAvg - newerAvg) > thr * 0.5;
    // Falling phase
    const goingDown = (newerAvg - olderAvg) > thr * 0.5;

    // We count on the DOWN phase completing (hip returns to baseline)
    // This is more reliable than counting on the UP phase
    if (!inJump && goingUp && dt > MIN_INTERVAL) {
      inJump = true;
    }

    if (inJump && goingDown && dt > MIN_INTERVAL) {
      count++;
      countDisplay.textContent = count;
      countDisplay.classList.add('pulse');
      setTimeout(() => countDisplay.classList.remove('pulse'), 100);
      flashEl.classList.add('on');
      setTimeout(() => flashEl.classList.remove('on'), 80);
      lastJumpTime = now;
      inJump = false;
      // Clear buffer to avoid re-triggering on same jump
      yBuffer.length = 0;
    }

    // Safety: reset stale inJump
    if (inJump && dt > 1200) inJump = false;

    statusEl.textContent = '跳绳中 🏃';
  }

  // --- Controls ---
  startBtn.addEventListener('click', () => {
    running = !running;
    if (running) {
      count = 0;
      countDisplay.textContent = '0';
      yBuffer = [];
      smoothedY = null;
      inJump = false;
      lastJumpTime = 0;
      startTime = Date.now();
      startBtn.textContent = '停止';
      startBtn.classList.add('running');
      statusEl.textContent = '跳绳中 🏃';
      clearInterval(timerInterval);
      timerInterval = setInterval(updateTimer, 1000);
    } else {
      startBtn.textContent = '开始';
      startBtn.classList.remove('running');
      statusEl.textContent = '已停止';
      clearInterval(timerInterval);
    }
  });

  document.getElementById('resetBtn').addEventListener('click', () => {
    count = 0;
    countDisplay.textContent = '0';
    yBuffer = [];
    smoothedY = null;
    inJump = false;
    if (running) { startTime = Date.now(); timerDisplay.textContent = '00:00'; }
    statusEl.textContent = '已重置';
  });

  function updateTimer() {
    if (!startTime) return;
    const s = Math.floor((Date.now() - startTime) / 1000);
    timerDisplay.textContent =
      String(Math.floor(s / 60)).padStart(2, '0') + ':' + String(s % 60).padStart(2, '0');
  }
})();
</script>
</body>
</html>
