<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>跳绳计数器</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0f;
    --card: #13131a;
    --accent: #6c5ce7;
    --accent2: #a29bfe;
    --green: #00b894;
    --orange: #fdcb6e;
    --red: #e17055;
    --text: #f0f0f5;
    --dim: #636e72;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
    height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    background: var(--card);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    flex-shrink: 0;
  }
  .header h1 {
    font-size: 18px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .header .fps-badge {
    font-size: 11px;
    color: var(--dim);
    background: rgba(255,255,255,0.05);
    padding: 3px 10px;
    border-radius: 20px;
  }

  /* Main area */
  .main {
    flex: 1;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* Video container */
  .video-wrap {
    position: relative;
    width: 100%;
    height: 100%;
  }
  #video, #canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  #video {
    transform: scaleX(-1);
  }
  #canvas {
    transform: scaleX(-1);
    pointer-events: none;
  }

  /* Overlay UI */
  .overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 10;
  }

  /* Center counter */
  .counter-ring {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -60%);
    text-align: center;
    pointer-events: none;
  }
  .count-number {
    font-size: clamp(64px, 18vw, 120px);
    font-weight: 900;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    text-shadow: 0 0 40px rgba(108,92,231,0.5), 0 2px 10px rgba(0,0,0,0.5);
    transition: transform 0.08s ease-out;
  }
  .count-number.jump-pulse {
    transform: scale(1.12);
  }
  .count-label {
    font-size: 14px;
    color: var(--accent2);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 4px;
    opacity: 0.8;
  }

  /* Status indicator */
  .status-dot {
    position: absolute;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(12px);
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 12px;
    pointer-events: auto;
  }
  .status-dot .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--dim);
  }
  .status-dot .dot.active { background: var(--green); box-shadow: 0 0 8px var(--green); }
  .status-dot .dot.error { background: var(--red); }

  /* Bottom stats bar */
  .stats-bar {
    position: absolute;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 12px;
    pointer-events: auto;
  }
  .stat-card {
    background: rgba(19,19,26,0.85);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 12px 20px;
    text-align: center;
    min-width: 90px;
  }
  .stat-card .val {
    font-size: 24px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }
  .stat-card .lbl {
    font-size: 11px;
    color: var(--dim);
    margin-top: 2px;
  }

  /* Buttons */
  .controls {
    position: absolute;
    bottom: 24px;
    right: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    pointer-events: auto;
    z-index: 20;
  }
  .ctrl-btn {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
  }
  .ctrl-btn:active { transform: scale(0.9); }
  .btn-start { background: var(--green); color: #fff; }
  .btn-stop { background: var(--red); color: #fff; }
  .btn-reset { background: var(--card); color: var(--text); border: 1px solid rgba(255,255,255,0.1); }

  /* Start screen */
  .start-screen {
    position: absolute;
    inset: 0;
    z-index: 30;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    padding: 40px;
    text-align: center;
  }
  .start-screen.hidden { display: none; }
  .start-icon {
    font-size: 72px;
    animation: bounce 1.5s infinite ease-in-out;
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-14px); }
  }
  .start-screen h2 {
    font-size: 28px;
    font-weight: 800;
  }
  .start-screen p {
    color: var(--dim);
    font-size: 14px;
    line-height: 1.6;
    max-width: 320px;
  }
  .start-btn {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    border: none;
    padding: 14px 48px;
    border-radius: 30px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 24px rgba(108,92,231,0.4);
  }
  .start-btn:hover { transform: scale(1.05); }

  /* History panel */
  .history-panel {
    position: absolute;
    top: 0; right: -300px;
    width: 280px;
    height: 100%;
    background: var(--card);
    border-left: 1px solid rgba(255,255,255,0.06);
    z-index: 40;
    transition: right 0.3s ease;
    padding: 20px;
    overflow-y: auto;
  }
  .history-panel.open { right: 0; }
  .history-panel h3 {
    font-size: 16px;
    margin-bottom: 16px;
  }
  .history-item {
    background: rgba(255,255,255,0.03);
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 8px;
  }
  .history-item .hi-count {
    font-size: 20px;
    font-weight: 700;
    color: var(--accent2);
  }
  .history-item .hi-meta {
    font-size: 11px;
    color: var(--dim);
    margin-top: 4px;
  }
  .no-history {
    color: var(--dim);
    font-size: 13px;
    text-align: center;
    margin-top: 40px;
  }

  /* Sensitivity slider */
  .sensitivity-wrap {
    position: absolute;
    top: 16px;
    right: 20px;
    pointer-events: auto;
    z-index: 20;
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(12px);
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 11px;
    color: var(--dim);
  }
  .sensitivity-wrap input[type=range] {
    width: 80px;
    accent-color: var(--accent);
  }

  /* Toast */
  .toast {
    position: absolute;
    top: 60px;
    left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.1);
    padding: 10px 24px;
    border-radius: 12px;
    font-size: 13px;
    opacity: 0;
    transition: all 0.3s;
    z-index: 50;
    pointer-events: none;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>

<!-- Start Screen -->
<div class="start-screen" id="startScreen">
  <div class="start-icon">🤸</div>
  <h2>跳绳计数器</h2>
  <p>使用摄像头自动检测跳跃<br>通过 AI 姿态分析精准计数</p>
  <button class="start-btn" id="startBtn">开始使用</button>
</div>

<!-- Header -->
<div class="header">
  <h1>🤸 跳绳计数器</h1>
  <div class="fps-badge" id="fpsBadge">-- FPS</div>
</div>

<!-- Main video area -->
<div class="main">
  <div class="video-wrap">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
  </div>

  <div class="overlay">
    <!-- Status -->
    <div class="status-dot" id="statusDot">
      <div class="dot" id="dot"></div>
      <span id="statusText">等待启动</span>
    </div>

    <!-- Sensitivity -->
    <div class="sensitivity-wrap">
      <span>灵敏度</span>
      <input type="range" id="sensitivity" min="1" max="10" value="5">
    </div>

    <!-- Center counter -->
    <div class="counter-ring">
      <div class="count-number" id="countNum" style="color:var(--accent2)">0</div>
      <div class="count-label">JUMPS</div>
    </div>

    <!-- Stats -->
    <div class="stats-bar">
      <div class="stat-card">
        <div class="val" id="timeVal">00:00</div>
        <div class="lbl">时间</div>
      </div>
      <div class="stat-card">
        <div class="val" id="rpmVal">0</div>
        <div class="lbl">次/分</div>
      </div>
      <div class="stat-card">
        <div class="val" id="calVal">0</div>
        <div class="lbl">千卡</div>
      </div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <button class="ctrl-btn btn-reset" id="resetBtn" title="重置">↺</button>
      <button class="ctrl-btn btn-start" id="toggleBtn" title="开始/暂停">▶</button>
      <button class="ctrl-btn btn-reset" id="historyBtn" title="历史记录">📋</button>
    </div>
  </div>

  <!-- History -->
  <div class="history-panel" id="historyPanel">
    <h3>📋 历史记录</h3>
    <div id="historyList">
      <div class="no-history">暂无记录</div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>
</div>

<!-- MediaPipe Pose -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>

<script>
(() => {
  'use strict';

  // Elements
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const startScreen = document.getElementById('startScreen');
  const startBtn = document.getElementById('startBtn');
  const toggleBtn = document.getElementById('toggleBtn');
  const resetBtn = document.getElementById('resetBtn');
  const historyBtn = document.getElementById('historyBtn');
  const historyPanel = document.getElementById('historyPanel');
  const historyList = document.getElementById('historyList');
  const countNum = document.getElementById('countNum');
  const timeVal = document.getElementById('timeVal');
  const rpmVal = document.getElementById('rpmVal');
  const calVal = document.getElementById('calVal');
  const fpsBadge = document.getElementById('fpsBadge');
  const dot = document.getElementById('dot');
  const statusText = document.getElementById('statusText');
  const toast = document.getElementById('toast');
  const sensitivitySlider = document.getElementById('sensitivity');

  // State
  let jumpCount = 0;
  let isRunning = false;
  let startTime = 0;
  let elapsed = 0;
  let poseReady = false;
  let lastJumpTime = 0;
  let jumpState = 'ground'; // 'ground' | 'air'
  let yHistory = [];
  let jumpTimes = [];
  let fps = 0;
  let frameCount = 0;
  let lastFpsTime = 0;
  let animFrame = null;
  let lastPoseResult = null;
  let history = JSON.parse(localStorage.getItem('jumpHistory') || '[]');
  let timerInterval = null;

  // Thresholds (tuned by sensitivity slider)
  function getThresholds() {
    const s = parseInt(sensitivitySlider.value); // 1-10
    return {
      jumpDelta: 0.06 + (10 - s) * 0.006,   // vertical displacement for jump
      cooldown: 250 + (10 - s) * 30,          // min ms between jumps
      historyLen: 5 + Math.floor((10 - s) / 2)
    };
  }

  // Init MediaPipe Pose
  const pose = new Pose({
    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
  });
  pose.setOptions({
    modelComplexity: 0,
    smoothLandmarks: true,
    enableSegmentation: false,
    minDetectionConfidence: 0.5,
    minTrackingConfidence: 0.5
  });
  pose.onResults(onPoseResults);

  // Start camera
  async function initCamera() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } }
      });
      video.srcObject = stream;
      await video.play();
      canvas.width = video.videoWidth || 640;
      canvas.height = video.videoHeight || 480;
      startScreen.classList.add('hidden');
      setStatus('active', '摄像头就绪');
      // Start processing
      processFrame();
    } catch (e) {
      setStatus('error', '无法访问摄像头');
      showToast('⚠️ 请允许摄像头权限');
      console.error(e);
    }
  }

  function processFrame() {
    if (video.readyState >= 2) {
      pose.send({ image: video }).then(() => {
        animFrame = requestAnimationFrame(processFrame);
      });
    } else {
      animFrame = requestAnimationFrame(processFrame);
    }
  }

  function onPoseResults(results) {
    // Draw skeleton
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // FPS calc
    frameCount++;
    const now = performance.now();
    if (now - lastFpsTime > 1000) {
      fps = Math.round(frameCount * 1000 / (now - lastFpsTime));
      fpsBadge.textContent = `${fps} FPS`;
      frameCount = 0;
      lastFpsTime = now;
    }

    if (results.poseLandmarks) {
      poseReady = true;
      lastPoseResult = results.poseLandmarks;

      // Draw connections & landmarks
      drawConnectors(ctx, results.poseLandmarks, POSE_CONNECTIONS,
        { color: 'rgba(108,92,231,0.5)', lineWidth: 2 });
      drawLandmarks(ctx, results.poseLandmarks,
        { color: 'rgba(162,155,254,0.7)', lineWidth: 1, radius: 3 });

      // Jump detection
      if (isRunning) {
        detectJump(results.poseLandmarks, now);
      }
    } else {
      poseReady = false;
      if (isRunning) setStatus('active', '寻找人体…');
    }
  }

  function detectJump(landmarks, now) {
    const thr = getThresholds();

    // Use hip midpoint (landmarks 23, 24) as body center
    const leftHip = landmarks[23];
    const rightHip = landmarks[24];
    if (!leftHip || !rightHip || (leftHip.visibility < 0.5 && rightHip.visibility < 0.5)) return;

    const hipY = (leftHip.y + rightHip.y) / 2;

    yHistory.push({ y: hipY, t: now });
    if (yHistory.length > thr.historyLen * 2) yHistory.shift();

    if (yHistory.length < thr.historyLen) return;

    // Compare current position with recent average
    const recent = yHistory.slice(-thr.historyLen);
    const older = yHistory.slice(-thr.historyLen * 2, -thr.historyLen);

    if (older.length < 3) return;

    const recentAvg = recent.reduce((s, p) => s + p.y, 0) / recent.length;
    const olderAvg = older.reduce((s, p) => s + p.y, 0) / older.length;
    const delta = olderAvg - recentAvg; // positive = moved up

    // Also check feet for better accuracy
    const leftAnkle = landmarks[27];
    const rightAnkle = landmarks[28];
    let footDelta = 0;
    if (leftAnkle && rightAnkle && leftAnkle.visibility > 0.5 && rightAnkle.visibility > 0.5) {
      const footY = (leftAnkle.y + rightAnkle.y) / 2;
      if (yHistory.length > 3) {
        const prevFoot = yHistory[yHistory.length - 3].y;
        footDelta = prevFoot - footY;
      }
    }

    // Jump detection: body moves up (y decreases in screen coords)
    const mainDelta = Math.max(delta, footDelta * 0.5);

    if (jumpState === 'ground' && mainDelta > thr.jumpDelta && (now - lastJumpTime) > thr.cooldown) {
      jumpState = 'air';
      jumpCount++;
      lastJumpTime = now;
      jumpTimes.push(now);

      // Update UI
      countNum.textContent = jumpCount;
      countNum.classList.add('jump-pulse');
      setTimeout(() => countNum.classList.remove('jump-pulse'), 100);

      // Change color at milestones
      if (jumpCount % 50 === 0) {
        countNum.style.color = 'var(--orange)';
        setTimeout(() => countNum.style.color = 'var(--accent2)', 600);
      }
    }

    // Reset to ground when body moves back down
    if (jumpState === 'air') {
      const rise = yHistory.slice(-4);
      if (rise.length >= 4) {
        const isFalling = rise[rise.length - 1].y > rise[rise.length - 2].y;
        if (isFalling && (now - lastJumpTime) > 120) {
          jumpState = 'ground';
        }
      }
    }
  }

  function updateStats() {
    if (!isRunning) return;
    elapsed = Date.now() - startTime;
    const mins = Math.floor(elapsed / 60000);
    const secs = Math.floor((elapsed % 60000) / 1000);
    timeVal.textContent = `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;

    // RPM (jumps per minute)
    const elapsedMin = elapsed / 60000;
    const rpm = elapsedMin > 0 ? Math.round(jumpCount / elapsedMin) : 0;
    rpmVal.textContent = rpm;

    // Calories (rough: ~0.15 kcal per jump)
    calVal.textContent = Math.round(jumpCount * 0.15);

    setStatus('active', `跳跃中 · ${jumpCount} 次`);
  }

  // Controls
  startBtn.addEventListener('click', initCamera);

  toggleBtn.addEventListener('click', () => {
    if (!poseReady && !isRunning) {
      showToast('⚠️ 等待摄像头就绪');
      return;
    }
    if (isRunning) {
      pause();
    } else {
      start();
    }
  });

  function start() {
    isRunning = true;
    if (startTime === 0) startTime = Date.now();
    else startTime = Date.now() - elapsed;
    toggleBtn.innerHTML = '⏸';
    toggleBtn.className = 'ctrl-btn btn-stop';
    timerInterval = setInterval(updateStats, 200);
    setStatus('active', '跳跃中');
    showToast('🟢 开始计数');
  }

  function pause() {
    isRunning = false;
    toggleBtn.innerHTML = '▶';
    toggleBtn.className = 'ctrl-btn btn-start';
    clearInterval(timerInterval);
    saveSession();
    setStatus('active', '已暂停');
    showToast('⏸ 已暂停');
  }

  resetBtn.addEventListener('click', () => {
    if (jumpCount > 0) saveSession();
    jumpCount = 0;
    elapsed = 0;
    startTime = 0;
    jumpState = 'ground';
    lastJumpTime = 0;
    yHistory = [];
    jumpTimes = [];
    countNum.textContent = '0';
    countNum.style.color = 'var(--accent2)';
    timeVal.textContent = '00:00';
    rpmVal.textContent = '0';
    calVal.textContent = '0';
    if (isRunning) pause();
    showToast('↺ 已重置');
  });

  historyBtn.addEventListener('click', () => {
    historyPanel.classList.toggle('open');
    renderHistory();
  });

  // Save & history
  function saveSession() {
    if (jumpCount === 0 || elapsed < 2000) return;
    const session = {
      count: jumpCount,
      duration: elapsed,
      rpm: Math.round(jumpCount / (elapsed / 60000)),
      cal: Math.round(jumpCount * 0.15),
      date: new Date().toLocaleString('zh-CN')
    };
    history.unshift(session);
    if (history.length > 20) history.pop();
    localStorage.setItem('jumpHistory', JSON.stringify(history));
  }

  function renderHistory() {
    if (history.length === 0) {
      historyList.innerHTML = '<div class="no-history">暂无记录</div>';
      return;
    }
    historyList.innerHTML = history.map(h => `
      <div class="history-item">
        <div class="hi-count">${h.count} 次</div>
        <div class="hi-meta">
          ${formatDuration(h.duration)} · ${h.rpm} 次/分 · ${h.cal} 千卡<br>
          ${h.date}
        </div>
      </div>
    `).join('');
  }

  function formatDuration(ms) {
    const m = Math.floor(ms / 60000);
    const s = Math.floor((ms % 60000) / 1000);
    return `${m}分${s}秒`;
  }

  // UI helpers
  function setStatus(type, text) {
    dot.className = 'dot ' + (type === 'active' ? 'active' : type === 'error' ? 'error' : '');
    statusText.textContent = text;
  }

  let toastTimeout;
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimeout);
    toastTimeout = setTimeout(() => toast.classList.remove('show'), 2000);
  }

  // Close history on outside click
  document.addEventListener('click', (e) => {
    if (historyPanel.classList.contains('open') &&
        !historyPanel.contains(e.target) &&
        e.target !== historyBtn) {
      historyPanel.classList.remove('open');
    }
  });

  // Keyboard shortcuts
  document.addEventListener('keydown', (e) => {
    if (e.code === 'Space') { e.preventDefault(); toggleBtn.click(); }
    if (e.code === 'KeyR') resetBtn.click();
  });
})();
</script>
</body>
</html>
