<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI跳绳计数器 | 手机摄像头实时识别</title>
    <!-- TensorFlow.js 核心库及 Pose Detection 模块 -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core@4.15.0/dist/tf-core.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter@4.15.0/dist/tf-converter.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl@4.15.0/dist/tf-backend-webgl.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3/dist/pose-detection.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #0a0f1e;
            font-family: 'Segoe UI', system-ui, -apple-system, 'Roboto', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            touch-action: none; /* 避免触摸时缩放/滚动干扰 */
        }

        /* 主容器 */
        .app-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            background: #000;
            border-radius: 36px;
            overflow: hidden;
            box-shadow: 0 25px 45px rgba(0,0,0,0.5);
        }

        /* 摄像头预览区 */
        .camera-wrapper {
            position: relative;
            width: 100%;
            background: #1a1f2e;
            aspect-ratio: 3 / 4; /* 更适合人体竖直姿态 */
            overflow: hidden;
        }

        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* 前置摄像头镜像，更自然 */
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
            transform: scaleX(-1); /* 与视频保持同步镜像，绘制关键点一致 */
        }

        /* 计数面板 (悬浮) */
        .counter-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(12px);
            border-radius: 60px;
            padding: 12px 24px;
            display: flex;
            align-items: baseline;
            gap: 8px;
            z-index: 20;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .counter-label {
            color: #ffffffcc;
            font-weight: 500;
            font-size: 1rem;
            letter-spacing: 1px;
        }

        .counter-value {
            font-size: 3rem;
            font-weight: 800;
            color: #ffd966;
            line-height: 1;
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        /* 状态指示区 */
        .status-bar {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            border-radius: 40px;
            padding: 10px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 20;
            font-size: 0.8rem;
            color: white;
            font-weight: 500;
            border: 1px solid rgba(255,255,255,0.15);
        }

        .model-status {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .led {
            width: 10px;
            height: 10px;
            border-radius: 10px;
            background-color: #ff4d4d;
            box-shadow: 0 0 4px currentColor;
        }

        .led.active {
            background-color: #2ecc71;
            box-shadow: 0 0 6px #2ecc71;
        }

        .action-btn {
            background: #f5a623;
            border: none;
            color: #1e272e;
            font-weight: bold;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        .action-btn:active {
            transform: scale(0.96);
            background: #e67e22;
        }

        .info-tip {
            font-size: 0.7rem;
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            padding: 4px 10px;
        }

        /* 加载遮罩 */
        .loading-overlay {
            position: absolute;
            inset: 0;
            background: #000000cc;
            backdrop-filter: blur(5px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 30;
            color: white;
            gap: 15px;
            font-weight: 500;
        }

        .spinner {
            width: 44px;
            height: 44px;
            border: 4px solid #ffffff40;
            border-top: 4px solid #f5a623;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 适配小屏 */
        @media (max-width: 550px) {
            .counter-value {
                font-size: 2.3rem;
            }
            .counter-panel {
                padding: 8px 18px;
                top: 12px;
                right: 12px;
            }
            .status-bar {
                bottom: 12px;
                left: 12px;
                right: 12px;
                padding: 6px 12px;
                font-size: 0.7rem;
            }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="camera-wrapper">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="output-canvas"></canvas>
        <!-- 悬浮UI -->
        <div class="counter-panel">
            <span class="counter-label">跳绳计数</span>
            <span class="counter-value" id="countDisplay">0</span>
        </div>
        <div class="status-bar">
            <div class="model-status">
                <div class="led" id="statusLed"></div>
                <span id="statusText">初始化中...</span>
            </div>
            <button class="action-btn" id="resetBtn">重置计数</button>
            <div class="info-tip">🤸 手腕/髋部摆动计数</div>
        </div>
    </div>
    <div id="loadingOverlay" class="loading-overlay">
        <div class="spinner"></div>
        <div>正在加载AI姿态模型</div>
        <div style="font-size:12px;">请求摄像头权限中...</div>
    </div>
</div>

<script>
    (function(){
        // ------ DOM 元素 ------
        const video = document.getElementById('video');
        const canvas = document.getElementById('output-canvas');
        const ctx = canvas.getContext('2d');
        const countSpan = document.getElementById('countDisplay');
        const resetBtn = document.getElementById('resetBtn');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const statusLed = document.getElementById('statusLed');
        const statusTextSpan = document.getElementById('statusText');
        
        // ------ 计数器逻辑 ------
        let jumpCount = 0;               // 总跳绳次数
        let lastPoseState = null;        // 记录上一帧的跳跃姿态状态 'up' / 'down' / null
        let cooldownFrames = 0;          // 简单防抖帧数，防止同一跳多次触发
        const COOLDOWN_MAX_FRAMES = 8;    // 大约8帧内只计一次 (30fps约0.26秒)
        
        // ------ 姿态检测相关 ------
        let detector = null;
        let detectionInterval = null;
        let isModelReady = false;
        let videoStream = null;
        
        // 关键点索引 (使用 BlazePose 的关键点名称映射，基于 COCO 33关键点 或 17关键点? MoveNet/BlazePose 通用)
        // 我们使用 PoseDetection 库自带的 KEYPOINT_NAMES 映射，但为保险使用标准索引:
        // BlazePose 主要关键点: 左肩(11),右肩(12),左髋(23),右髋(24),左膝(25),右膝(26),左踝(27),右踝(28)
        // 为了检测跳跃上下运动，我们使用 左髋/右髋 的平均Y坐标变化 (或者鼻子与髋的相对变化)。但跳绳更适合检测垂直振幅。
        // 为了更鲁棒，使用 ** 左右髋中心点 Y 坐标 ** 相对波峰波谷检测 (连续过零点检测)
        let prevHipY = null;            // 上一帧髋部中心y (归一化坐标 0~1)
        let movingThreshold = 0.035;     // 动态阈值(归一化坐标变动幅度) 根据不同设备适应
        let lastDirection = null;        // 'rising' 身体上升 (起跳)  'falling' 下落
        let lastPeakTime = 0;            // 辅助防高频
        
        // 姿态检测的置信度过滤
        const MIN_CONFIDENCE = 0.35;
        
        // 获取关键点辅助函数 (基于pose.keypoints 或 keypoints3D? 统一用 keypoints)
        function getKeypoint(pose, nameOrIndex) {
            // 如果传入的是字符串，尝试通过name查找（BlazePose模型会带name）
            if(typeof nameOrIndex === 'string') {
                const found = pose.keypoints?.find(kp => kp.name === nameOrIndex);
                if(found) return found;
                // fallback 使用索引映射
                const map = { 'left_hip':23, 'right_hip':24, 'left_shoulder':11, 'right_shoulder':12 };
                const idx = map[nameOrIndex];
                if(idx !== undefined && pose.keypoints && pose.keypoints[idx]) return pose.keypoints[idx];
                return null;
            } else {
                // 数字索引
                if(pose.keypoints && pose.keypoints[nameOrIndex]) return pose.keypoints[nameOrIndex];
                return null;
            }
        }
        
        // 计算左右髋部中心Y (归一化坐标 0-1)
        function getHipCenterY(pose) {
            let leftHip = getKeypoint(pose, 'left_hip');
            let rightHip = getKeypoint(pose, 'right_hip');
            // 兼容部分模型使用 'left_hip' 或索引23/24
            if(!leftHip || !rightHip) {
                leftHip = pose.keypoints?.[23];
                rightHip = pose.keypoints?.[24];
            }
            if(leftHip && rightHip && leftHip.score > MIN_CONFIDENCE && rightHip.score > MIN_CONFIDENCE) {
                return (leftHip.y + rightHip.y) / 2;
            }
            // 备选只用一侧
            if(leftHip && leftHip.score > MIN_CONFIDENCE) return leftHip.y;
            if(rightHip && rightHip.score > MIN_CONFIDENCE) return rightHip.y;
            return null;
        }
        
        // 更新计数基于髋部垂直运动 (类正弦波，上升->下降 一个完整周期计一次)
        // 原理: 起跳时身体上升(Y减小)，落地时身体下降(Y增大)。检测从上升到下降的转变（峰值识别）计一次跳
        function updateCountByHipMotion(currentHipY) {
            if(currentHipY === null || prevHipY === null) {
                prevHipY = currentHipY;
                return;
            }
            
            // 计算变化量（归一化坐标差）
            let deltaY = currentHipY - prevHipY;   // 正值表示髋部向下移动(下降)，负值表示向上移动(起跳)
            // 运动方向检测
            let currentDirection = null;
            if(deltaY > movingThreshold) currentDirection = 'falling';     // 下落明显
            else if(deltaY < -movingThreshold) currentDirection = 'rising'; // 上升明显
            
            // 状态机: 当之前状态是 'rising' (上升起跳) 然后转变为 'falling' (落地) 时，计为一次完整跳绳
            if(lastDirection === 'rising' && currentDirection === 'falling') {
                // 增加防抖: 避免落地瞬间多次计数 (与cooldownFrames结合)
                if(cooldownFrames <= 0) {
                    jumpCount++;
                    countSpan.innerText = jumpCount;
                    // 震动反馈 (可选，仅支持https环境且用户交互允许)
                    if(navigator.vibrate) navigator.vibrate(50);
                    cooldownFrames = COOLDOWN_MAX_FRAMES;
                    // 添加视觉反馈: 改变计数显示动画
                    const counterDiv = document.querySelector('.counter-value');
                    counterDiv.style.transform = 'scale(1.2)';
                    setTimeout(() => { if(counterDiv) counterDiv.style.transform = ''; }, 150);
                }
            }
            
            // 更新方向
            if(currentDirection !== null) {
                lastDirection = currentDirection;
            }
            
            // 更新前一帧Y值
            prevHipY = currentHipY;
        }
        
        // 重置计数以及状态机
        function resetCounter() {
            jumpCount = 0;
            countSpan.innerText = "0";
            lastDirection = null;
            prevHipY = null;
            cooldownFrames = 0;
            // 保持lastPoseState兼容旧逻辑清除
            lastPoseState = null;
            if(navigator.vibrate) navigator.vibrate(30);
            statusTextSpan.innerText = "计数已重置";
            setTimeout(()=>{
                if(isModelReady) statusTextSpan.innerText = "识别中";
            },1000);
        }
        
        // ------ 绘制骨架及关键点(可视化辅助) ------
        function drawPose(pose) {
            if(!ctx || !canvas) return;
            const width = canvas.clientWidth;
            const height = canvas.clientHeight;
            canvas.width = width;
            canvas.height = height;
            ctx.clearRect(0, 0, width, height);
            if(!pose || !pose.keypoints) return;
            
            const keypoints = pose.keypoints;
            // 绘制连线 (BlazePose典型骨架: 肩膀->髋部, 髋部->膝盖等)
            function drawLine(i1, i2) {
                const p1 = keypoints[i1];
                const p2 = keypoints[i2];
                if(p1 && p2 && p1.score > 0.3 && p2.score > 0.3) {
                    ctx.beginPath();
                    ctx.moveTo(p1.x * width, p1.y * height);
                    ctx.lineTo(p2.x * width, p2.y * height);
                    ctx.lineWidth = 3;
                    ctx.strokeStyle = '#00ffcc';
                    ctx.shadowBlur = 0;
                    ctx.stroke();
                }
            }
            // 定义连接对 (基于COCO或BlazePose索引)
            const connections = [
                [11,12], // 肩
                [11,13],[13,15], // 左臂简单
                [12,14],[14,16], // 右臂
                [11,23],[12,24], // 躯干侧
                [23,24], // 髋横
                [23,25],[25,27], // 左腿
                [24,26],[26,28]  // 右腿
            ];
            connections.forEach(conn => drawLine(conn[0], conn[1]));
            
            // 绘制关键点: 特别高亮髋部区域
            for(let i=0; i<keypoints.length; i++) {
                const kp = keypoints[i];
                if(kp.score > 0.4) {
                    let radius = 5;
                    let color = '#ffaa44';
                    if(i === 23 || i === 24) { // 髋部高亮
                        radius = 8;
                        color = '#ff6b4a';
                    }
                    ctx.beginPath();
                    ctx.arc(kp.x * width, kp.y * height, radius, 0, 2*Math.PI);
                    ctx.fillStyle = color;
                    ctx.fill();
                    ctx.strokeStyle = '#ffffff';
                    ctx.lineWidth = 1.5;
                    ctx.stroke();
                }
            }
            
            // 额外显示髋部中心点轨迹指示(当前帧)
            const hipCenter = getHipCenterY(pose);
            if(hipCenter) {
                ctx.beginPath();
                ctx.arc(width/2, hipCenter * height, 10, 0, 2*Math.PI);
                ctx.fillStyle = '#ff3366cc';
                ctx.fill();
                ctx.fillStyle = 'white';
                ctx.font = 'bold 16px system-ui';
                ctx.shadowBlur = 0;
                ctx.fillText('↓', width/2-8, hipCenter * height - 5);
            }
        }
        
        // ------ 核心姿态检测循环 ------
        async function runDetection() {
            if (!detector || !video || video.readyState < 2) {
                return;
            }
            try {
                // 执行姿态估计
                const poses = await detector.estimatePoses(video, { flipHorizontal: true }); // 镜像与canvas同步
                if (poses && poses.length > 0) {
                    const pose = poses[0];
                    // 绘制骨架
                    drawPose(pose);
                    // 获取髋部中心Y值
                    const hipY = getHipCenterY(pose);
                    if (hipY !== null) {
                        updateCountByHipMotion(hipY);
                        // 更新状态灯和文字
                        statusLed.classList.add('active');
                        statusTextSpan.innerText = "姿态跟踪中";
                    } else {
                        statusLed.classList.remove('active');
                        statusTextSpan.innerText = "未检测到躯干";
                    }
                } else {
                    // 无人姿态
                    drawPose(null);
                    statusLed.classList.remove('active');
                    statusTextSpan.innerText = "未检测到人体";
                    // 重置运动状态避免错误计数
                    prevHipY = null;
                    lastDirection = null;
                }
                // 更新cooldown递减
                if (cooldownFrames > 0) cooldownFrames--;
            } catch (err) {
                console.warn("检测出错", err);
                statusTextSpan.innerText = "检测异常";
            }
        }
        
        // 启动定时检测 (30fps左右)
        function startDetectionLoop() {
            if (detectionInterval) clearInterval(detectionInterval);
            detectionInterval = setInterval(() => {
                if (isModelReady && video && video.readyState === video.HAVE_ENOUGH_DATA) {
                    runDetection();
                }
            }, 1000 / 28); // 约28-30fps
        }
        
        // ------ 初始化模型 (MoveNet 或 BlazePose, 优先 BlazePose 更准确) ------
        async function initPoseDetector() {
            try {
                // 设置tfjs后端
                await tf.setBackend('webgl');
                await tf.ready();
                
                // 加载姿态检测模型: 使用BlazePose (精度较高，对跳绳更友好) 或者 MoveNet
                // 考虑到性能和通用性，优先选择 BlazePose (轻量且关键点丰富)
                const model = poseDetection.SupportedModels.BlazePose;
                const detectorConfig = {
                    runtime: 'tfjs',
                    modelType: 'lite',   // 'lite' 速度更快, 对手机友好, 'full'精度更高但稍慢
                    enableSmoothing: true
                };
                detector = await poseDetection.createDetector(model, detectorConfig);
                isModelReady = true;
                statusTextSpan.innerText = "准备就绪，请面对镜头";
                statusLed.classList.add('active');
                // 移除loading遮罩
                if(loadingOverlay) loadingOverlay.style.display = 'none';
                // 开启检测循环
                startDetectionLoop();
            } catch (err) {
                console.error("模型加载失败", err);
                statusTextSpan.innerText = "模型加载失败，请刷新";
                loadingOverlay.innerHTML = `<div style="text-align:center; padding:20px;">模型加载失败<br><button id="retryBtn" style="margin-top:12px; background:#f5a623; border:none; padding:8px 18px; border-radius:40px;">重试</button></div>`;
                const retryBtn = document.getElementById('retryBtn');
                if(retryBtn) retryBtn.onclick = () => location.reload();
            }
        }
        
        // ------ 请求摄像头权限并启动视频流 ------
        async function startCamera() {
            try {
                const constraints = {
                    video: {
                        facingMode: 'environment', // 优先后置？跳绳更倾向于前置自拍但镜像不影响，使用user前置方便用户看屏幕
                        // 但为了更佳体验，使用 'user' 前置摄像头，用户可看自己动作
                        facingMode: 'user',
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    }
                };
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                videoStream = stream;
                video.srcObject = stream;
                await video.play();
                // 等待视频元数据加载
                await new Promise((resolve) => {
                    if(video.readyState >= 2) resolve();
                    else video.onloadeddata = () => resolve();
                });
                // 设置canvas尺寸匹配video实际显示尺寸
                const updateCanvasSize = () => {
                    const rect = video.getBoundingClientRect();
                    canvas.width = rect.width;
                    canvas.height = rect.height;
                    canvas.style.width = `${rect.width}px`;
                    canvas.style.height = `${rect.height}px`;
                };
                updateCanvasSize();
                window.addEventListener('resize', updateCanvasSize);
                // 开始初始化模型
                await initPoseDetector();
            } catch (err) {
                console.error("摄像头错误:", err);
                loadingOverlay.innerHTML = `<div style="text-align:center; padding:20px;">无法访问摄像头<br>请确保已授予权限并支持https环境<br><button id="reTryCam" style="margin-top:12px; background:#f5a623; border:none; padding:8px 18px; border-radius:40px;">重试</button></div>`;
                const retryCam = document.getElementById('reTryCam');
                if(retryCam) retryCam.onclick = () => location.reload();
                statusTextSpan.innerText = "摄像头无权限";
            }
        }
        
        // 重置按钮监听
        resetBtn.addEventListener('click', () => {
            resetCounter();
        });
        
        // 页面卸载时释放资源
        window.addEventListener('beforeunload', () => {
            if (detectionInterval) clearInterval(detectionInterval);
            if (videoStream) {
                videoStream.getTracks().forEach(track => track.stop());
            }
            if (detector) detector.dispose?.();
        });
        
        // 启动流程
        startCamera();
    })();
</script>
</body>
</html>
