<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>智能跳绳计数器 | 手机传感器精确计数</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(145deg, #1a2f3f 0%, #0e1a24 100%);
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, 'Roboto', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        /* 主卡片 */
        .counter-card {
            max-width: 500px;
            width: 100%;
            background: rgba(22, 34, 48, 0.75);
            backdrop-filter: blur(2px);
            border-radius: 64px 48px 64px 48px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.4), inset 0 1px 1px rgba(255, 255, 255, 0.1);
            padding: 24px 20px 36px;
            transition: all 0.2s;
        }

        /* 头部标题 */
        .header {
            text-align: center;
            margin-bottom: 24px;
        }
        .header h1 {
            font-size: 1.9rem;
            font-weight: 700;
            margin: 0;
            background: linear-gradient(135deg, #FFD166, #F4A261);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }
        .header p {
            color: #9ab3c7;
            margin: 8px 0 0;
            font-size: 0.85rem;
            font-weight: 500;
        }

        /* 大数字计数器 */
        .count-display {
            background: #07131c;
            margin: 15px 0 10px;
            border-radius: 60px;
            padding: 20px 12px;
            text-align: center;
            box-shadow: inset 0 5px 10px rgba(0,0,0,0.5), 0 8px 18px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,215,130,0.3);
        }
        .count-number {
            font-size: 6rem;
            font-weight: 800;
            font-family: 'Monaco', 'Courier New', monospace;
            color: #F4E3B2;
            text-shadow: 0 0 8px #ffb34750;
            letter-spacing: 6px;
            line-height: 1;
            transition: transform 0.1s ease;
        }
        .count-unit {
            font-size: 1.2rem;
            color: #b9d2e8;
            margin-left: 8px;
            font-weight: 500;
        }

        /* 目标区域 */
        .goal-section {
            background: #0F212E;
            border-radius: 48px;
            padding: 12px 18px;
            margin: 18px 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }
        .goal-label {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #1e3a4a;
            padding: 6px 14px;
            border-radius: 40px;
        }
        .goal-label span {
            color: #ffe1a0;
            font-weight: 600;
        }
        #goalValue {
            background: #00000066;
            border: 1px solid #F4A261;
            color: #ffdd99;
            font-size: 1.2rem;
            font-weight: bold;
            width: 80px;
            text-align: center;
            border-radius: 40px;
            padding: 6px 0;
            font-family: monospace;
        }
        .goal-buttons {
            display: flex;
            gap: 12px;
        }
        .goal-buttons button {
            background: #2C4C5C;
            border: none;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            width: 42px;
            border-radius: 30px;
            padding: 6px 0;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .goal-buttons button:active {
            transform: scale(0.94);
            background: #F4A261;
        }

        /* 传感器状态 & 实时摇动反馈 */
        .sensor-status {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            background: #07192380;
            border-radius: 40px;
            padding: 8px 16px;
            margin: 16px 0;
            font-size: 0.75rem;
            flex-wrap: wrap;
            gap: 8px;
        }
        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .led {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: gray;
            box-shadow: 0 0 4px;
        }
        .led.active {
            background-color: #3eff9e;
            box-shadow: 0 0 8px #00ffaa;
        }
        .sensitivity {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        input#sensRange {
            width: 110px;
            accent-color: #F4A261;
        }

        /* 按钮区域 */
        .action-buttons {
            display: flex;
            gap: 18px;
            justify-content: center;
            margin: 24px 0 16px;
            flex-wrap: wrap;
        }
        .btn {
            border: none;
            background: #2F455B;
            padding: 12px 24px;
            border-radius: 48px;
            font-weight: bold;
            font-size: 1rem;
            color: #F0F3F8;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: 0.15s linear;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            backdrop-filter: blur(4px);
        }
        .btn-primary {
            background: #E76F51;
            color: white;
            box-shadow: 0 5px 0 #9c3e22;
            transform: translateY(-2px);
        }
        .btn-primary:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #9c3e22;
        }
        .btn-reset {
            background: #2c3e4e;
        }
        .btn-warning {
            background: #9e2d2f;
        }
        .btn:active {
            transform: scale(0.96);
        }

        /* 进度条 */
        .progress-container {
            background: #0a1922;
            border-radius: 30px;
            height: 12px;
            margin: 20px 10px 10px;
            overflow: hidden;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #F4A261, #E76F51);
            border-radius: 30px;
            transition: width 0.2s ease;
        }

        /* 历史记录简洁区 */
        .history {
            margin-top: 24px;
            background: #07131C80;
            border-radius: 32px;
            padding: 12px 16px;
        }
        .history-title {
            font-size: 0.8rem;
            font-weight: 600;
            color: #e9c891;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #2e4a5e;
            padding-bottom: 6px;
            margin-bottom: 10px;
        }
        #historyList {
            max-height: 100px;
            overflow-y: auto;
            font-size: 0.75rem;
            color: #cbdae6;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .history-badge {
            background: #1e3a3f;
            padding: 4px 12px;
            border-radius: 30px;
            font-family: monospace;
        }

        footer {
            font-size: 0.6rem;
            text-align: center;
            color: #5c7f8c;
            margin-top: 18px;
        }

        @media (max-width: 450px) {
            .count-number {
                font-size: 4rem;
            }
            .btn {
                padding: 8px 16px;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
<div class="counter-card" id="app">
    <div class="header">
        <h1>⚡ 智能跳绳机</h1>
        <p>抬手即计 | 传感器精确计数</p>
    </div>

    <!-- 核心计数器 -->
    <div class="count-display">
        <span class="count-number" id="countDisplay">0</span>
        <span class="count-unit">次</span>
    </div>

    <!-- 目标设置栏 -->
    <div class="goal-section">
        <div class="goal-label">
            <span>🎯 今日目标</span>
            <input type="number" id="goalValue" value="200" step="10" min="10" max="5000">
        </div>
        <div class="goal-buttons">
            <button id="goalDown">-50</button>
            <button id="goalUp">+50</button>
        </div>
    </div>

    <!-- 传感器状态 + 灵敏度调节 -->
    <div class="sensor-status">
        <div class="status-badge">
            <div class="led" id="sensorLed"></div>
            <span id="sensorText">⏳ 等待授权</span>
        </div>
        <div class="sensitivity">
            <span>🎚️ 灵敏度</span>
            <input type="range" id="sensRange" min="0.8" max="2.2" step="0.02" value="1.4">
            <span id="sensVal" style="min-width: 38px;">1.40</span>
        </div>
    </div>

    <!-- 主要操作区 -->
    <div class="action-buttons">
        <button class="btn btn-primary" id="startBtn">▶ 开始计数</button>
        <button class="btn" id="pauseBtn">⏸ 暂停</button>
        <button class="btn btn-reset" id="resetBtn">🔄 重置本次</button>
        <button class="btn btn-warning" id="clearHistoryBtn">🗑 清除记录</button>
    </div>

    <!-- 进度条 目标完成度 -->
    <div class="progress-container">
        <div class="progress-fill" id="progressFill"></div>
    </div>

    <!-- 简易记录 -->
    <div class="history">
        <div class="history-title">
            <span>📋 最近完成记录 (达到目标)</span>
            <span id="totalCountLabel">总计:0</span>
        </div>
        <div id="historyList">暂无记录，完成目标自动保存</div>
    </div>
    <footer>💡 将手机握在手中，模拟跳绳摆臂动作 | 自动过滤误触</footer>
</div>

<script>
    (function(){
        // ---------- DOM 元素 ----------
        const countSpan = document.getElementById('countDisplay');
        const goalInput = document.getElementById('goalValue');
        const goalDown = document.getElementById('goalDown');
        const goalUp = document.getElementById('goalUp');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const resetBtn = document.getElementById('resetBtn');
        const clearHistoryBtn = document.getElementById('clearHistoryBtn');
        const progressFill = document.getElementById('progressFill');
        const sensorLed = document.getElementById('sensorLed');
        const sensorTextSpan = document.getElementById('sensorText');
        const sensRange = document.getElementById('sensRange');
        const sensValSpan = document.getElementById('sensVal');
        const historyListDiv = document.getElementById('historyList');
        const totalCountLabel = document.getElementById('totalCountLabel');

        // ---------- 核心状态 ----------
        let currentCount = 0;          // 当前跳绳次数
        let targetCount = 200;          // 目标值
        let isCounting = false;         // 是否正在计数 (运动检测)
        let sensorSupported = false;
        let accelerometer = null;
        
        // 防抖 / 计数抑制参数 (避免一次摆动多次触发)
        let lastTimestamp = 0;
        let cooldownMs = 280;           // 最小间隔280毫秒，防止连续误计，适合跳绳摆动频率上限约3.5次/秒
        
        // 历史记录存储 (存每次完成目标的时间戳和次数, 实际存储完成时的跳绳数)
        let historyRecords = [];   // 元素: { count: number, date: Date }
        
        // 用于运动检测的阈值 (基于加速度变化幅度)
        let sensitivity = 1.4;      // 默认1.4，越大越不敏感，越小越敏感
        
        // 记录上一帧加速度总量 (用于检测冲击)
        let lastAccMagnitude = 0;
        let lastHighGTime = 0;
        
        // 标志传感器是否已经请求/启动
        let sensorInitialized = false;
        
        // ---------- 辅助函数 ----------
        function updateUI() {
            // 更新主数字
            countSpan.innerText = currentCount;
            // 更新进度条百分比 (基于目标)
            let percent = (currentCount / targetCount) * 100;
            if(percent > 100) percent = 100;
            if(percent < 0) percent = 0;
            progressFill.style.width = `${percent}%`;
            // 目标显示与输入框同步
            if(goalInput.value != targetCount) {
                goalInput.value = targetCount;
            }
            // 目标达成时 视觉闪一下 (通过临时类 但不用过度)
            if(currentCount >= targetCount && targetCount > 0) {
                // 额外可做特效，但是为了防止多次触发达成记录, 我们在达到的那一次单独处理.
                // 真正记录在 count 增加后的逻辑里判断
            }
        }
        
        // 保存历史记录到 localStorage
        function saveHistoryToLocal() {
            try {
                const toStore = historyRecords.map(rec => ({
                    count: rec.count,
                    date: rec.date.toISOString()
                }));
                localStorage.setItem('jumpRopeHistory', JSON.stringify(toStore));
            } catch(e) { console.warn(e); }
        }
        
        // 加载历史
        function loadHistoryFromLocal() {
            const stored = localStorage.getItem('jumpRopeHistory');
            if(stored) {
                try {
                    let arr = JSON.parse(stored);
                    historyRecords = arr.map(item => ({
                        count: item.count,
                        date: new Date(item.date)
                    })).slice(0, 12); // 最多12条
                    renderHistoryList();
                } catch(e){}
            }
            updateTotalCountLabel();
        }
        
        // 渲染历史列表
        function renderHistoryList() {
            if(!historyListDiv) return;
            if(historyRecords.length === 0) {
                historyListDiv.innerHTML = '<span style="opacity:0.7;">✨ 暂无记录，完成目标自动保存</span>';
                return;
            }
            let html = '';
            // 倒序显示最新的在前
            [...historyRecords].reverse().forEach(rec => {
                const dateStr = `${rec.date.getMonth()+1}/${rec.date.getDate()} ${rec.date.getHours().toString().padStart(2,'0')}:${rec.date.getMinutes().toString().padStart(2,'0')}`;
                html += `<div class="history-badge">🎉 ${rec.count}次 (${dateStr})</div>`;
            });
            historyListDiv.innerHTML = html;
            updateTotalCountLabel();
        }
        
        function updateTotalCountLabel() {
            const total = historyRecords.reduce((sum, r) => sum + r.count, 0);
            totalCountLabel.innerText = `总计:${total}`;
        }
        
        // 新增历史记录 (当达到目标时调用，避免重复记录相同目标值，但允许连续突破)
        function addHistoryRecord(completedCount) {
            // 防止重复添加完全相同的计数 (如果最后一条记录计数相同且时间在5秒内，可忽略，但无所谓)
            if(historyRecords.length > 0) {
                let last = historyRecords[historyRecords.length-1];
                if(last.count === completedCount && (new Date() - last.date) < 3000) {
                    return; // 避免瞬间两次记录
                }
            }
            historyRecords.push({
                count: completedCount,
                date: new Date()
            });
            // 保留最近20条记录
            if(historyRecords.length > 20) historyRecords.shift();
            renderHistoryList();
            saveHistoryToLocal();
        }
        
        // 重置当前计数 (不清历史)
        function resetCurrentCount() {
            if(!isCounting) {
                // 若暂停状态可以直接重置
            }
            currentCount = 0;
            updateUI();
            // 额外去除目标达成标志即可
        }
        
        // 检查目标达成 (每次计数增加后调用)
        function checkGoalAchieved() {
            if(targetCount <= 0) return;
            // 恰好等于目标 或 刚刚超过目标时， 记录一次完成（基于本次跳绳完成突破目标）
            // 为了防止多次记录同一个目标区间多次添加，需要记录上一次是否已经为本次目标记录过flag
            // 使用一个临时标记: 记录 lastGoalAchievedCount 版本
            if(!window._goalFlagRecord) window._goalFlagRecord = -1;
            if(currentCount >= targetCount && window._goalFlagRecord !== currentCount) {
                // 触发完成目标记录，但记录完成时的跳绳总次数 (可以是超过后的值)
                // 为了体现成就感，记录完成时的总数
                if(currentCount > 0) {
                    addHistoryRecord(currentCount);
                    window._goalFlagRecord = currentCount;
                    // 轻微震动提示 (如果支持)
                    if(navigator.vibrate) navigator.vibrate(200);
                    // 可选: 闪烁提示
                    const displayDiv = document.querySelector('.count-display');
                    if(displayDiv) {
                        displayDiv.style.transform = 'scale(1.02)';
                        setTimeout(()=>{ if(displayDiv) displayDiv.style.transform = ''; }, 200);
                    }
                }
            } else if(currentCount < targetCount) {
                // 重置标记当计数低于目标时（下一次超过会再次记录）
                if(window._goalFlagRecord >= targetCount) window._goalFlagRecord = -1;
            }
        }
        
        // 增加计数的核心方法 (带防抖与冷却)
        function incrementCount() {
            if(!isCounting) return false;
            const now = Date.now();
            if(now - lastTimestamp < cooldownMs) return false;
            lastTimestamp = now;
            currentCount++;
            updateUI();
            checkGoalAchieved();
            return true;
        }
        
        // 传感器数据处理 (基于设备运动)
        function handleMotionEvent(event) {
            if(!isCounting) return;
            // 获取加速度计数据 (包含重力)
            let acc = event.accelerationIncludingGravity;
            if(!acc) {
                // 某些设备用 acceleration
                acc = event.acceleration;
            }
            if(!acc) return;
            
            let x = acc.x || 0;
            let y = acc.y || 0;
            let z = acc.z || 0;
            // 计算合成加速度幅值 (单位 m/s²)
            let magnitude = Math.sqrt(x*x + y*y + z*z);
            // 通常静止时约9.8，动态变化量更关键
            // 检测变化率：当前幅值与上一帧幅值差值绝对值，再结合阈值
            let delta = Math.abs(magnitude - lastAccMagnitude);
            lastAccMagnitude = magnitude;
            
            // 核心: 冲击检测，跳绳动作会产生瞬间加速度尖峰，delta变化大
            // 灵敏度调整: 阈值 = 基准值 4.5 * (1/灵敏度因子) 为了让用户滑动范围合适，默认灵敏度1.4约阈值3.2
            // 公式: 阈值 = 3.0 / sensitivity + 1.2 ; 范围灵敏度0.8~2.2对应阈值约4.95~2.56
            let dynamicThresh = (3.2 / sensitivity) + 1.0;
            if(dynamicThresh < 2.2) dynamicThresh = 2.2;
            if(dynamicThresh > 6.0) dynamicThresh = 6.0;
            
            // 额外条件： magnitude 与重力差值大于某个值(动态突变)
            let gravityDiff = Math.abs(magnitude - 9.8);
            // 摆动有效: delta 变化超过阈值 且 冲击幅度明显(或者重力差异大)
            if(delta > dynamicThresh && (gravityDiff > 2.0 || delta > 2.5)) {
                incrementCount();
                // 提供轻微的触觉反馈模拟真实跳绳感 (可选)
                if(navigator.vibrate) navigator.vibrate(20);
                // 闪烁LED状态反馈
                sensorLed.style.backgroundColor = '#FFD966';
                sensorLed.style.boxShadow = '0 0 8px gold';
                setTimeout(()=>{
                    if(sensorLed) {
                        sensorLed.style.backgroundColor = '#3eff9e';
                        sensorLed.style.boxShadow = '0 0 8px #00ffaa';
                    }
                }, 100);
            }
        }
        
        // 请求传感器权限并启动监听
        async function initSensor() {
            if(sensorInitialized) return true;
            // 检查 DeviceMotionEvent 是否存在
            if(typeof DeviceMotionEvent !== 'undefined') {
                // 针对 iOS 13+ 需要用户授权
                if (typeof DeviceMotionEvent.requestPermission === 'function') {
                    // iOS 需要显式调用
                    sensorTextSpan.innerText = '需要授权运动传感器';
                    sensorLed.classList.remove('active');
                    sensorLed.style.backgroundColor = 'gray';
                    // 在按钮点击时再调用 requestPermission，但为了体验，在点击“开始计数”时联动初始化。
                    // 但我们可以提前在页面加载时通过用户点击某按钮? 为了方便，开始计数时会尝试授权。
                    sensorSupported = false;
                    return false;
                } else {
                    // Android & 其他直接添加监听
                    window.addEventListener('devicemotion', handleMotionEvent);
                    sensorSupported = true;
                    sensorLed.style.backgroundColor = '#3eff9e';
                    sensorLed.classList.add('active');
                    sensorTextSpan.innerText = '传感器工作中 ✓';
                    sensorInitialized = true;
                    return true;
                }
            } else {
                sensorTextSpan.innerText = '设备不支持运动传感器';
                sensorSupported = false;
                return false;
            }
        }
        
        // iOS 专用请求授权 (需在用户手势下)
        async function requestIOSPermission() {
            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                try {
                    const permissionState = await DeviceMotionEvent.requestPermission();
                    if (permissionState === 'granted') {
                        window.addEventListener('devicemotion', handleMotionEvent);
                        sensorSupported = true;
                        sensorLed.style.backgroundColor = '#3eff9e';
                        sensorLed.classList.add('active');
                        sensorTextSpan.innerText = '传感器工作中 ✓';
                        sensorInitialized = true;
                        return true;
                    } else {
                        sensorTextSpan.innerText = '传感器权限被拒绝';
                        return false;
                    }
                } catch (err) {
                    sensorTextSpan.innerText = '授权失败';
                    console.error(err);
                    return false;
                }
            } else {
                return initSensor();
            }
        }
        
        // 停止传感器监听(移除事件)
        function stopSensorListener() {
            window.removeEventListener('devicemotion', handleMotionEvent);
            sensorInitialized = false;
            sensorLed.style.backgroundColor = 'gray';
            sensorLed.classList.remove('active');
            sensorTextSpan.innerText = '传感器已停止';
            sensorSupported = false;
        }
        
        // 开始计数流程 (UI状态 + 传感器)
        async function startCounting() {
            if(isCounting) return;
            // 如果传感器未初始化或者未授权，尝试授权
            if(!sensorInitialized) {
                // iOS 风格授权
                if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                    const granted = await requestIOSPermission();
                    if(!granted) {
                        alert('请允许运动传感器权限，才能使用跳绳计数');
                        return;
                    }
                } else {
                    const success = await initSensor();
                    if(!success) {
                        alert('无法启用运动传感器，请检查设备支持或权限');
                        return;
                    }
                }
            } else {
                // 已经初始化但可能移除了监听，重新添加
                window.addEventListener('devicemotion', handleMotionEvent);
                sensorTextSpan.innerText = '传感器工作中 ✓';
                sensorLed.style.backgroundColor = '#3eff9e';
                sensorLed.classList.add('active');
            }
            isCounting = true;
            sensorTextSpan.innerText = '⚡ 计数中 摇动跳绳';
            // 重置最后幅值缓存
            lastAccMagnitude = 0;
            lastTimestamp = Date.now() - cooldownMs; // 保证第一时间可计
        }
        
        function pauseCounting() {
            if(!isCounting) return;
            isCounting = false;
            // 不断开传感器监听但停止计数逻辑，保留数据
            sensorTextSpan.innerText = '⏸ 暂停计数';
            sensorLed.style.backgroundColor = '#ffaa44';
        }
        
        // 重置当前会话
        function resetSession() {
            pauseCounting();     // 暂停状态避免误触发
            currentCount = 0;
            updateUI();
            window._goalFlagRecord = -1;
            // 不清传感器，但重置计数后需要保证暂停状态,用户再按开始
        }
        
        // 清除所有历史记录
        function clearHistory() {
            historyRecords = [];
            renderHistoryList();
            saveHistoryToLocal();
            if(window._goalFlagRecord) window._goalFlagRecord = -1;
        }
        
        // 灵敏度显示更新
        function updateSensitivity() {
            sensitivity = parseFloat(sensRange.value);
            sensValSpan.innerText = sensitivity.toFixed(2);
        }
        
        // 目标调节
        function setTarget(value) {
            let newTarget = Math.min(5000, Math.max(10, Math.floor(value)));
            targetCount = newTarget;
            goalInput.value = targetCount;
            updateUI();
            // 重新检查目标达成状态
            checkGoalAchieved();
        }
        
        // 事件绑定
        startBtn.addEventListener('click', startCounting);
        pauseBtn.addEventListener('click', pauseCounting);
        resetBtn.addEventListener('click', resetSession);
        clearHistoryBtn.addEventListener('click', clearHistory);
        goalDown.addEventListener('click', () => setTarget(targetCount - 50));
        goalUp.addEventListener('click', () => setTarget(targetCount + 50));
        goalInput.addEventListener('change', (e) => setTarget(parseInt(e.target.value) || 200));
        sensRange.addEventListener('input', () => {
            updateSensitivity();
        });
        
        // 初始化 UI 和本地数据
        updateSensitivity();
        loadHistoryFromLocal();
        setTarget(200);
        resetSession();   // 初始计数为0，暂停状态，未启动传感器
        // 在页面加载时不自动启动传感器，等待用户点击开始计数，以便处理iOS权限。
        // 提示用户需要点击开始，并且保证初始没有监听，避免乱震
        sensorTextSpan.innerText = '点击“开始计数”启用';
        sensorLed.style.backgroundColor = '#7f8c8d';
        
        // 页面关闭前保存历史（额外保险）
        window.addEventListener('beforeunload', () => {
            saveHistoryToLocal();
        });
    })();
</script>
</body>
</html>
