<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>智能跳绳计数器 | 离线版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', system-ui, -apple-system, 'Roboto', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }

        .app-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            background: #000;
            border-radius: 48px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        .camera-wrapper {
            position: relative;
            width: 100%;
            background: #1a1a2e;
            aspect-ratio: 3 / 4;
            overflow: hidden;
        }

        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
            transform: scaleX(-1);
        }

        /* 计数面板 */
        .counter-panel {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(12px);
            border-radius: 80px;
            padding: 12px 28px;
            display: flex;
            align-items: baseline;
            gap: 12px;
            z-index: 20;
            border: 1px solid rgba(255,215,0,0.5);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .counter-label {
            color: #ffd966;
            font-weight: 600;
            font-size: 1rem;
            letter-spacing: 1px;
        }

        .counter-value {
            font-size: 3.5rem;
            font-weight: 800;
            color: #ffd966;
            line-height: 1;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            font-family: monospace;
        }

        /* 状态栏 */
        .status-bar {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            border-radius: 40px;
            padding: 12px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 20;
            font-size: 0.75rem;
            color: white;
            font-weight: 500;
            border: 1px solid rgba(255,255,255,0.2);
            flex-wrap: wrap;
            gap: 8px;
        }

        .model-status {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .led {
            width: 10px;
            height: 10px;
            border-radius: 10px;
            background-color: #ff4d4d;
            transition: all 0.2s;
        }

        .led.active {
            background-color: #2ecc71;
            box-shadow: 0 0 8px #2ecc71;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .action-btn {
            background: #f5a623;
            border: none;
            color: #1e272e;
            font-weight: bold;
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        .action-btn:active {
            transform: scale(0.95);
        }

        .info-tip {
            font-size: 0.7rem;
            background: rgba(0,0,0,0.6);
            border-radius: 20px;
            padding: 4px 10px;
        }

        /* 引导提示 */
        .guide-overlay {
            position: absolute;
            bottom: 100px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            padding: 16px;
            z-index: 25;
            text-align: center;
            color: white;
            font-size: 0.85rem;
            border: 1px solid rgba(255,215,0,0.3);
            transition: opacity 0.5s;
        }

        .guide-overlay.hide {
            opacity: 0;
            pointer-events: none;
        }

        .close-guide {
            background: #f5a623;
            border: none;
            padding: 6px 20px;
            border-radius: 30px;
            margin-top: 12px;
            font-weight: bold;
            cursor: pointer;
        }

        /* 加载遮罩 */
        .loading-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, #1e1e2f, #0a0a1a);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 30;
            color: white;
            gap: 20px;
            font-weight: 500;
            text-align: center;
            padding: 20px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.2);
            border-top: 4px solid #f5a623;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 运动指示器 */
        .motion-indicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(245,166,35,0.3);
            border: 2px solid #f5a623;
            z-index: 15;
            pointer-events: none;
            opacity: 0;
            transition: all 0.1s;
        }

        .motion-indicator.active {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1.2);
            background: rgba(245,166,35,0.5);
        }

        @media (max-width: 550px) {
            .counter-value {
                font-size: 2.5rem;
            }
            .counter-panel {
                padding: 8px 20px;
                top: 12px;
            }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="camera-wrapper">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="output-canvas"></canvas>
        
        <!-- 计数面板 -->
        <div class="counter-panel">
            <span class="counter-label">跳绳计数</span>
            <span class="counter-value" id="countDisplay">0</span>
        </div>
        
        <!-- 运动指示器 -->
        <div class="motion-indicator" id="motionIndicator"></div>
        
        <!-- 状态栏 -->
        <div class="status-bar">
            <div class="model-status">
                <div class="led" id="statusLed"></div>
                <span id="statusText">初始化摄像头...</span>
            </div>
            <button class="action-btn" id="resetBtn">重置计数</button>
            <div class="info-tip" id="tipText">📱 上下运动自动计数</div>
        </div>
        
        <!-- 引导提示 -->
        <div class="guide-overlay" id="guideOverlay">
            <div>🎯 使用指南</div>
            <div style="font-size: 12px; margin-top: 8px;">
                1. 将手机放在地上或固定位置<br>
                2. 全身入镜，保持髋部在画面中<br>
                3. 跳绳时上下运动，自动计数<br>
                4. 每次完整跳跃计1次
            </div>
            <button class="close-guide" onclick="document.getElementById('guideOverlay').classList.add('hide')">开始跳绳</button>
        </div>
    </div>
    
    <div id="loadingOverlay" class="loading-overlay">
        <div class="spinner"></div>
        <div id="loadingMessage">正在启动摄像头...</div>
        <div style="font-size: 12px; color: #aaa;">请允许摄像头权限</div>
    </div>
</div>

<script>
    (function() {
        // DOM 元素
        const video = document.getElementById('video');
        const canvas = document.getElementById('output-canvas');
        const ctx = canvas.getContext('2d');
        const countSpan = document.getElementById('countDisplay');
        const resetBtn = document.getElementById('resetBtn');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const statusLed = document.getElementById('statusLed');
        const statusTextSpan = document.getElementById('statusText');
        const loadingMessage = document.getElementById('loadingMessage');
        const motionIndicator = document.getElementById('motionIndicator');
        
        // 计数器变量
        let jumpCount = 0;
        let prevMotionY = null;           // 上一帧运动中心Y坐标
        let lastDirection = null;          // 'up' 或 'down'
        let cooldownFrames = 0;
        const COOLDOWN_FRAMES = 10;        // 防抖帧数
        
        // 运动检测参数
        let frameCount = 0;
        let prevFrameData = null;           // 上一帧灰度数据
        let motionHistory = [];              // 运动强度历史
        
        // 摄像头状态
        let videoStream = null;
        let isRunning = false;
        let animationId = null;
        
        // 检测参数
        const MOTION_THRESHOLD = 25;         // 运动强度阈值
        const MIN_MOTION_FRAMES = 3;         // 最少连续运动帧数
        
        // 获取视频帧的灰度数据（用于运动检测）
        function getGrayScaleData(videoElement) {
            if (!videoElement || videoElement.readyState < 2) return null;
            
            // 创建临时canvas获取当前帧
            const tempCanvas = document.createElement('canvas');
            const width = videoElement.videoWidth;
            const height = videoElement.videoHeight;
            
            if (width === 0 || height === 0) return null;
            
            tempCanvas.width = 80;   // 缩小分辨率提高性能
            tempCanvas.height = 60;
            const tempCtx = tempCanvas.getContext('2d');
            tempCtx.drawImage(videoElement, 0, 0, width, height, 0, 0, 80, 60);
            
            const imageData = tempCtx.getImageData(0, 0, 80, 60);
            const data = imageData.data;
            
            // 转换为灰度图
            const gray = new Uint8Array(80 * 60);
            for (let i = 0; i < gray.length; i++) {
                const r = data[i * 4];
                const g = data[i * 4 + 1];
                const b = data[i * 4 + 2];
                gray[i] = Math.floor(0.299 * r + 0.587 * g + 0.114 * b);
            }
            
            return gray;
        }
        
        // 计算两帧之间的运动强度（帧差法）
        function calculateMotionIntensity(currentGray, prevGray) {
            if (!currentGray || !prevGray || currentGray.length !== prevGray.length) return 0;
            
            let totalDiff = 0;
            const len = currentGray.length;
            
            for (let i = 0; i < len; i++) {
                const diff = Math.abs(currentGray[i] - prevGray[i]);
                totalDiff += diff;
            }
            
            // 返回平均差异
            return totalDiff / len;
        }
        
        // 分析运动方向（上下运动检测）
        function detectMotionDirection(currentGray, prevGray) {
            if (!currentGray || !prevGray) return null;
            
            const width = 80;
            const height = 60;
            
            // 计算画面上下部分的运动差异
            let topMotion = 0;
            let bottomMotion = 0;
            const topCount = 0;
            const bottomCount = 0;
            
            const halfHeight = height / 2;
            let topTotal = 0;
            let bottomTotal = 0;
            let topPixels = 0;
            let bottomPixels = 0;
            
            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const idx = y * width + x;
                    const diff = Math.abs(currentGray[idx] - prevGray[idx]);
                    
                    if (y < halfHeight) {
                        topTotal += diff;
                        topPixels++;
                    } else {
                        bottomTotal += diff;
                        bottomPixels++;
                    }
                }
            }
            
            const avgTop = topTotal / (topPixels || 1);
            const avgBottom = bottomTotal / (bottomPixels || 1);
            
            // 上下运动检测：如果上部运动强度明显大于下部，说明身体在向上运动
            // 反之向下运动
            if (avgTop > avgBottom + 3) {
                return 'up';
            } else if (avgBottom > avgTop + 3) {
                return 'down';
            }
            
            return null;
        }
        
        // 绘制可视化指示器
        function drawVisualization(motionIntensity, direction) {
            if (!ctx || !canvas) return;
            
            const width = canvas.clientWidth;
            const height = canvas.clientHeight;
            canvas.width = width;
            canvas.height = height;
            ctx.clearRect(0, 0, width, height);
            
            // 绘制运动强度指示条
            const intensityPercent = Math.min(100, (motionIntensity / 50) * 100);
            const barHeight = 8;
            const barY = height - 30;
            
            ctx.fillStyle = 'rgba(0,0,0,0.6)';
            ctx.fillRect(20, barY, width - 40, barHeight);
            
            ctx.fillStyle = motionIntensity > MOTION_THRESHOLD ? '#2ecc71' : '#f5a623';
            ctx.fillRect(20, barY, (width - 40) * (intensityPercent / 100), barHeight);
            
            // 绘制运动方向指示
            if (direction === 'up') {
                ctx.fillStyle = '#2ecc71';
                ctx.font = 'bold 24px system-ui';
                ctx.shadowBlur = 0;
                ctx.fillText('↑', width / 2 - 15, height / 2 - 20);
            } else if (direction === 'down') {
                ctx.fillStyle = '#f5a623';
                ctx.font = 'bold 24px system-ui';
                ctx.fillText('↓', width / 2 - 15, height / 2 + 20);
            }
            
            // 绘制文字提示
            ctx.fillStyle = 'white';
            ctx.font = '12px system-ui';
            ctx.fillText('运动强度', 20, barY - 5);
            
            if (motionIntensity > MOTION_THRESHOLD) {
                ctx.fillStyle = '#2ecc71';
                ctx.fillText('检测到运动', width - 80, barY - 5);
            }
        }
        
        // 更新计数基于运动方向
        function updateCountByDirection(direction) {
            if (cooldownFrames > 0) {
                cooldownFrames--;
                return;
            }
            
            // 检测完整的上下运动周期：up -> down 或 down -> up 算一次跳跃
            if (lastDirection === 'up' && direction === 'down') {
                // 完成一次跳跃
                jumpCount++;
                countSpan.innerText = jumpCount;
                
                // 视觉反馈
                motionIndicator.classList.add('active');
                setTimeout(() => {
                    motionIndicator.classList.remove('active');
                }, 150);
                
                // 震动反馈
                if (navigator.vibrate) navigator.vibrate(50);
                
                // 计数动画
                const counterDiv = document.querySelector('.counter-value');
                counterDiv.style.transform = 'scale(1.3)';
                setTimeout(() => {
                    if (counterDiv) counterDiv.style.transform = '';
                }, 150);
                
                // 设置冷却
                cooldownFrames = COOLDOWN_FRAMES;
                
                // 更新状态提示
                statusTextSpan.innerText = "✓ 计数 +1";
                setTimeout(() => {
                    if (isRunning) statusTextSpan.innerText = "识别中";
                }, 500);
            }
            
            // 更新方向
            if (direction !== null) {
                lastDirection = direction;
            }
        }
        
        // 主检测循环
        async function detectMotion() {
            if (!video || video.readyState < 2) {
                return;
            }
            
            try {
                // 获取当前帧灰度数据
                const currentGray = getGrayScaleData(video);
                
                if (currentGray && prevFrameData) {
                    // 计算运动强度
                    const motionIntensity = calculateMotionIntensity(currentGray, prevFrameData);
                    
                    // 检测运动方向
                    const direction = detectMotionDirection(currentGray, prevFrameData);
                    
                    // 更新运动历史
                    motionHistory.push({ intensity: motionIntensity, direction: direction });
                    if (motionHistory.length > 10) motionHistory.shift();
                    
                    // 计算平均运动强度
                    const avgIntensity = motionHistory.reduce((sum, item) => sum + item.intensity, 0) / motionHistory.length;
                    
                    // 更新状态LED
                    if (avgIntensity > MOTION_THRESHOLD) {
                        statusLed.classList.add('active');
                        if (isRunning) statusTextSpan.innerText = "运动检测中";
                    } else {
                        statusLed.classList.remove('active');
                        if (isRunning) statusTextSpan.innerText = "请跳绳";
                    }
                    
                    // 当运动强度超过阈值且有明确方向时，更新计数
                    if (avgIntensity > MOTION_THRESHOLD && direction !== null) {
                        updateCountByDirection(direction);
                    }
                    
                    // 绘制可视化
                    drawVisualization(avgIntensity, direction);
                } else {
                    // 没有足够数据，清空画布
                    if (ctx && canvas) {
                        canvas.width = canvas.clientWidth;
                        canvas.height = canvas.clientHeight;
                        ctx.clearRect(0, 0, canvas.width, canvas.height);
                    }
                }
                
                // 保存当前帧数据
                prevFrameData = currentGray;
                
            } catch (err) {
                console.warn("检测错误:", err);
            }
        }
        
        // 动画循环
        function animateDetection() {
            if (!isRunning) return;
            
            detectMotion();
            animationId = requestAnimationFrame(animateDetection);
        }
        
        // 启动检测
        function startDetection() {
            if (animationId) cancelAnimationFrame(animationId);
            isRunning = true;
            animateDetection();
        }
        
        // 停止检测
        function stopDetection() {
            isRunning = false;
            if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
            }
        }
        
        // 重置计数器
        function resetCounter() {
            jumpCount = 0;
            countSpan.innerText = "0";
            lastDirection = null;
            cooldownFrames = 0;
            motionHistory = [];
            prevFrameData = null;
            
            if (navigator.vibrate) navigator.vibrate(30);
            statusTextSpan.innerText = "已重置";
            setTimeout(() => {
                if (isRunning) statusTextSpan.innerText = "识别中";
            }, 1000);
        }
        
        // 启动摄像头
        async function startCamera() {
            try {
                const constraints = {
                    video: {
                        facingMode: 'user',  // 前置摄像头
                        width: { ideal: 640 },
                        height: { ideal: 480 }
                    }
                };
                
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                videoStream = stream;
                video.srcObject = stream;
                
                await video.play();
                
                // 等待视频就绪
                await new Promise((resolve) => {
                    if (video.readyState >= 2) {
                        resolve();
                    } else {
                        video.onloadeddata = () => resolve();
                    }
                });
                
                // 设置canvas尺寸
                const updateCanvasSize = () => {
                    const rect = video.getBoundingClientRect();
                    canvas.width = rect.width;
                    canvas.height = rect.height;
                    canvas.style.width = `${rect.width}px`;
                    canvas.style.height = `${rect.height}px`;
                };
                updateCanvasSize();
                window.addEventListener('resize', updateCanvasSize);
                
                // 隐藏加载界面
                loadingOverlay.style.display = 'none';
                statusTextSpan.innerText = "就绪，开始跳绳吧！";
                statusLed.classList.add('active');
                
                // 开始检测
                startDetection();
                
            } catch (err) {
                console.error("摄像头错误:", err);
                loadingOverlay.innerHTML = `
                    <div style="text-align:center; padding:20px;">
                        <div style="font-size: 48px; margin-bottom: 16px;">📷</div>
                        <div style="margin-bottom: 12px;">无法访问摄像头</div>
                        <div style="font-size: 12px; margin-bottom: 20px; color: #ccc;">
                            请确保：<br>
                            1. 已授予摄像头权限<br>
                            2. 使用 HTTPS 访问<br>
                            3. 刷新页面重试
                        </div>
                        <button class="action-btn" onclick="location.reload()" style="background: #f5a623;">重新尝试</button>
                    </div>
                `;
                statusTextSpan.innerText = "摄像头无权限";
            }
        }
        
        // 重置按钮事件
        resetBtn.addEventListener('click', resetCounter);
        
        // 清理资源
        window.addEventListener('beforeunload', () => {
            stopDetection();
            if (videoStream) {
                videoStream.getTracks().forEach(track => track.stop());
            }
        });
        
        // 启动
        startCamera();
    })();
</script>
</body>
</html>
